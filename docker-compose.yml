version: '3.8'

services:
  gateway:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/conf.d:/etc/nginx/conf.d:ro
      - ./gateway/certs:/etc/nginx/certs:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./certs/default_cert.jpg:/usr/share/nginx/html/certs/default_cert.jpg:ro
    depends_on:
      - service-a
      - service-b
      - echo-service
    networks:
      - gateway-net

  service-a:
    image: hashicorp/http-echo:latest
    container_name: backend-service-a
    command: -text="Hello from Service A (Target /)"
    networks:
      - gateway-net

  service-b:
    image: hashicorp/http-echo:latest
    container_name: backend-service-b
    command: -text="Hello from Service B (Target /api)"
    networks:
      - gateway-net

  echo-service:
    image: ealen/echo-server:latest
    container_name: backend-echo
    environment:
      - PORT=80
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge
