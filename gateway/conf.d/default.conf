# Upstream definition for load balancing
upstream service_a_backend {
    server service-a:5678; # Port exposed by hashicorp/http-echo
    keepalive 32;
}

upstream service_b_backend {
    server service-b:5678;
    keepalive 32;
}

upstream echo_backend {
    server echo-service:80;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name localhost;

    # SSL Termination configuration
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Global Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Custom Header injection - Request ID for end-to-end tracing
    proxy_set_header X-Request-ID $request_id;
    add_header X-Request-ID $request_id always;

    # Proxy Headers configuration
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Serve the static certificate generator at the root path
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # API Route: Service A (Rewrite: /api/v1/service-a/foo -> /foo)
    location /api/v1/service-a/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        rewrite ^/api/v1/service-a/(.*)$ /$1 break;
        proxy_pass http://service_a_backend;
    }

    # API Route: Service B (Rewrite: /api/v1/service-b/foo -> /api/foo)
    location /api/v1/service-b/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        rewrite ^/api/v1/service-b/(.*)$ /api/$1 break;
        proxy_pass http://service_b_backend;
    }

    # Echo Service route to inspect injected and modified headers
    location /headers {
        proxy_pass http://echo_backend;
    }

    # Custom 429 rate limit exceeded response in JSON
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error": "Too Many Requests", "message": "You have exceeded your rate limit. Please try again later.", "request_id": "$request_id"}';
    }
}
